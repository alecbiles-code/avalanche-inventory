<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorado Front Range — SAR Avalanche Inventory</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-panel: rgba(8, 10, 18, 0.94);
      --border-subtle: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #f0f0f5;
      --text-secondary: #8a8a9a;
      --text-muted: #55556a;
      --accent-red: #ef4444;
      --accent-yellow: #facc15;
      --accent-purple: #a855f7;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: #06060a; overflow: hidden; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    /* ── Panel ──────────────────────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: var(--bg-panel);
      color: var(--text-primary);
      padding: 0;
      border-radius: 14px;
      width: 280px;
      z-index: 1;
      box-shadow:
        0 0 0 1px var(--border-subtle),
        0 8px 40px rgba(0,0,0,0.7),
        0 2px 8px rgba(0,0,0,0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      animation: panelSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(-10px);
    }

    @keyframes panelSlide {
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      margin-bottom: 3px;
    }

    .panel-header .subtitle {
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.5;
      letter-spacing: 0.1px;
    }

    .panel-section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .panel-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 9.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* ── Legend ─────────────────────────────────────────────────────────── */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .legend-item:last-child { margin-bottom: 0; }

    .legend-swatch {
      width: 20px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      position: relative;
    }

    .legend-swatch::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
    }

    .legend-label-conf {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 500;
    }

    .conf-high {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
    }

    .conf-low {
      background: rgba(250, 204, 21, 0.15);
      color: var(--accent-yellow);
    }

    /* ── Filters ────────────────────────────────────────────────────────── */
    #season-filter {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #season-filter label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    #season-filter label:hover {
      background: rgba(255,255,255,0.04);
    }

    #season-filter input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #season-filter input[type="checkbox"]:checked {
      background: var(--accent-red);
      border-color: var(--accent-red);
    }

    #season-filter input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3.5px;
      top: 1px;
      width: 4px;
      height: 7px;
      border: solid #fff;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    /* ── Toggles ────────────────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 5px 0;
    }

    .toggle-row + .toggle-row {
      margin-top: 2px;
    }

    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background: #666;
      border-radius: 50%;
      transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:checked + .toggle-slider {
      background: var(--accent-red);
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(16px);
      background: #fff;
    }

    /* ── Stats ──────────────────────────────────────────────────────────── */
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 11px;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border-hover);
    }

    .stat-card.wide {
      grid-column: 1 / -1;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 9.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-top: 2px;
    }

    /* ── Popup ──────────────────────────────────────────────────────────── */
    .maplibregl-popup-content {
      background: rgba(8, 10, 18, 0.96) !important;
      color: var(--text-primary) !important;
      border-radius: 10px !important;
      padding: 14px 16px !important;
      border: 1px solid var(--border-subtle) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      font-size: 12px !important;
      min-width: 220px;
      font-family: var(--font-body) !important;
    }

    .maplibregl-popup-tip {
      border-top-color: rgba(8, 10, 18, 0.96) !important;
    }

    .maplibregl-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 18px !important;
      padding: 4px 8px !important;
      right: 4px !important;
      top: 4px !important;
    }

    .maplibregl-popup-close-button:hover {
      color: var(--text-primary) !important;
      background: transparent !important;
    }

    .popup-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
      letter-spacing: -0.2px;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 3px 0;
      color: var(--text-muted);
      font-size: 11.5px;
    }

    .popup-row span:last-child {
      color: var(--text-secondary);
      font-weight: 500;
      text-align: right;
    }

    .confidence-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }

    .confidence-badge.high {
      background: rgba(239, 68, 68, 0.2);
      color: var(--accent-red);
    }

    .confidence-badge.low {
      background: rgba(250, 204, 21, 0.2);
      color: var(--accent-yellow);
    }

    /* ── MapLibre overrides ─────────────────────────────────────────────── */
    .maplibregl-ctrl-group {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border-subtle) !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
      overflow: hidden;
    }

    .maplibregl-ctrl-group button {
      background: transparent !important;
      border-color: var(--border-subtle) !important;
    }

    .maplibregl-ctrl-group button + button {
      border-top: 1px solid var(--border-subtle) !important;
    }

    .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
      filter: invert(1) brightness(0.7);
    }

    .maplibregl-ctrl-group button:hover .maplibregl-ctrl-icon {
      filter: invert(1) brightness(1);
    }

    .maplibregl-ctrl-scale {
      background: rgba(8,10,18,0.8) !important;
      color: var(--text-muted) !important;
      border-color: var(--text-muted) !important;
      font-family: var(--font-mono) !important;
      font-size: 10px !important;
      padding: 1px 6px !important;
      border-radius: 4px !important;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(8,10,18,0.7) !important;
      font-size: 9px !important;
    }

    .maplibregl-ctrl-attrib a {
      color: var(--text-muted) !important;
    }

    /* ── Debug console for hotspot ──────────────────────────────────────── */
    #debug-msg {
      display: none;
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--accent-yellow);
      background: rgba(250, 204, 21, 0.08);
      border: 1px solid rgba(250, 204, 21, 0.15);
      padding: 8px 10px;
      border-radius: 6px;
      line-height: 1.6;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <!-- Header -->
    <div class="panel-header">
      <h2>SAR Avalanche Inventory</h2>
      <p class="subtitle">Colorado Front Range · Sentinel-1 amplitude change detection · 2021–2024</p>
    </div>

    <!-- Legend -->
    <div class="panel-section">
      <div class="section-label">Confidence Symbology</div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--accent-red); opacity:1;"></div>
        <span>Higher confidence</span>
        <span class="legend-label-conf conf-high">100%</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--accent-yellow); opacity:0.7;"></div>
        <span>Lower confidence</span>
        <span class="legend-label-conf conf-low">70%</span>
      </div>
    </div>

    <!-- Season Filter -->
    <div class="panel-section">
      <div class="section-label">Filter by Season</div>
      <div id="season-filter">
        <label><input type="checkbox" value="2021-2022" checked> 2021–2022</label>
        <label><input type="checkbox" value="2022-2023" checked> 2022–2023</label>
        <label><input type="checkbox" value="2023-2024" checked> 2023–2024</label>
      </div>
    </div>

    <!-- Layer Toggles -->
    <div class="panel-section">
      <div class="section-label">Layers</div>
      <div class="toggle-row">
        <span>Seasonal detections</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-seasonal" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>Cross-season hotspots</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-hotspot">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div id="debug-msg"></div>
    </div>

    <!-- Stats -->
    <div class="panel-section">
      <div class="section-label">Viewport Statistics</div>
      <div id="stats">
        <div class="stat-card">
          <div class="stat-value" id="count">–</div>
          <div class="stat-label">Events</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-area">–</div>
          <div class="stat-label">Area (ha)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="high-conf">–</div>
          <div class="stat-label">High Conf.</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="low-conf">–</div>
          <div class="stat-label">Low Conf.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── PMTiles protocol ────────────────────────────────────────────────────
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    // ── Map init with satellite + dark blend ────────────────────────────────
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'esri-satellite': {
            type: 'raster',
            tiles: [
              'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
            ],
            tileSize: 256,
            maxzoom: 19,
            attribution: '© Esri, Maxar, Earthstar Geographics'
          },
          'carto-dark-labels': {
            type: 'raster',
            tiles: [
              'https://basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}@2x.png'
            ],
            tileSize: 256,
            attribution: '© CARTO © OpenStreetMap contributors'
          }
        },
        layers: [
          {
            id: 'satellite',
            type: 'raster',
            source: 'esri-satellite',
            paint: {
              'raster-brightness-max': 0.55,
              'raster-contrast': 0.15,
              'raster-saturation': -0.3
            }
          },
          {
            id: 'labels',
            type: 'raster',
            source: 'carto-dark-labels',
            paint: { 'raster-opacity': 0.85 }
          }
        ]
      },
      center: [-105.78, 40.0],
      zoom: 9
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

    // ── Load layers on map ready ────────────────────────────────────────────
    map.on('load', () => {

      // — Seasonal detections source —
      map.addSource('avalanches', {
        type: 'vector',
        url: 'pmtiles://all_seasons.pmtiles'
      });

      // Fill — symbolized by confidence, NOT season
      map.addLayer({
        id: 'avalanche-fill',
        type: 'fill',
        source: 'avalanches',
        'source-layer': 'avalanches',
        paint: {
          'fill-color': [
            'case',
            ['==', ['get', 'confidence'], 'higher confidence'], '#ef4444',
            '#facc15'
          ],
          'fill-opacity': [
            'case',
            ['==', ['get', 'confidence'], 'higher confidence'], 1.0,
            0.7
          ]
        }
      });

      // Outline
      map.addLayer({
        id: 'avalanche-outline',
        type: 'line',
        source: 'avalanches',
        'source-layer': 'avalanches',
        paint: {
          'line-color': [
            'case',
            ['==', ['get', 'confidence'], 'higher confidence'],
            'rgba(239, 68, 68, 0.6)',
            'rgba(250, 204, 21, 0.4)'
          ],
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            7, 0.3,
            12, 1
          ],
          'line-opacity': 0.5
        }
      });

      // — Cross-season hotspot source —
      map.addSource('hotspots', {
        type: 'vector',
        url: 'pmtiles://cross_season_hotspot.pmtiles'
      });

      // Inspect hotspot source metadata for debugging
      map.on('sourcedata', (e) => {
        if (e.sourceId === 'hotspots' && e.isSourceLoaded) {
          try {
            const src = map.getSource('hotspots');
            // Log available vector layer IDs from PMTiles metadata
            console.log('[Hotspot debug] Source loaded:', src);

            // Attempt to find features with different possible source-layer names
            const candidates = ['hotspots', 'cross_season_hotspot', 'default', 'cross_season_hotspots'];
            candidates.forEach(name => {
              try {
                const testFeatures = map.querySourceFeatures('hotspots', { sourceLayer: name });
                if (testFeatures.length > 0) {
                  console.log(`[Hotspot debug] Found ${testFeatures.length} features in source-layer "${name}"`);
                  const debugEl = document.getElementById('debug-msg');
                  if (debugEl && name !== 'hotspots') {
                    debugEl.style.display = 'block';
                    debugEl.textContent = `⚠ Hotspot source-layer might be "${name}" (found ${testFeatures.length} features). Update layer config.`;
                  }
                }
              } catch (err) { /* skip */ }
            });
          } catch (err) {
            console.log('[Hotspot debug] Metadata read error:', err);
          }
        }
      });

      // Hotspot fill — try with 'hotspots' source-layer
      map.addLayer({
        id: 'hotspot-fill',
        type: 'fill',
        source: 'hotspots',
        'source-layer': 'hotspots',
        layout: { visibility: 'none' },
        paint: {
          'fill-color': '#a855f7',
          'fill-opacity': 0.55
        }
      });

      // Hotspot outline
      map.addLayer({
        id: 'hotspot-outline',
        type: 'line',
        source: 'hotspots',
        'source-layer': 'hotspots',
        layout: { visibility: 'none' },
        paint: {
          'line-color': '#c084fc',
          'line-width': 1.5,
          'line-opacity': 0.7
        }
      });

      updateStats();
    });

    // ── Popup ───────────────────────────────────────────────────────────────
    const popup = new maplibregl.Popup({ closeButton: true, maxWidth: '280px' });

    function showPopup(e, isHotspot) {
      if (!e.features.length) return;
      const f = e.features[0].properties;
      const area_ha = f.Area_m2 ? (f.Area_m2 / 10000).toFixed(2) : '–';
      const isHigh = f.confidence === 'higher confidence';
      const confBadgeClass = isHigh ? 'high' : 'low';
      const confLabel = isHigh ? 'Higher' : 'Lower';

      const typeRow = isHotspot
        ? `<div class="popup-row"><span>Type</span><span>Cross-season hotspot</span></div>`
        : `<div class="popup-row"><span>Season</span><span>${f.season || '–'}</span></div>`;

      popup.setLngLat(e.lngLat).setHTML(`
        <div class="popup-title">${f.event_id || 'Avalanche Detection'}</div>
        ${typeRow}
        <div class="popup-row"><span>Area</span><span>${area_ha} ha</span></div>
        <div class="popup-row"><span>Confidence</span><span class="confidence-badge ${confBadgeClass}">${confLabel}</span></div>
        <div class="popup-row"><span>Sensor</span><span>Sentinel-1 C-SAR</span></div>
      `).addTo(map);
    }

    map.on('click', 'avalanche-fill', (e) => showPopup(e, false));
    map.on('click', 'hotspot-fill',   (e) => showPopup(e, true));

    ['avalanche-fill', 'hotspot-fill'].forEach(id => {
      map.on('mouseenter', id, () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', id, () => map.getCanvas().style.cursor = '');
    });

    // ── Season filter ───────────────────────────────────────────────────────
    function applySeasonFilter() {
      const active = [...document.querySelectorAll('#season-filter input:checked')]
                     .map(cb => cb.value);
      const filter = active.length === 3
        ? null
        : ['in', ['get', 'season'], ['literal', active]];

      ['avalanche-fill', 'avalanche-outline'].forEach(id => map.setFilter(id, filter));
      updateStats();
    }

    document.querySelectorAll('#season-filter input').forEach(cb => {
      cb.addEventListener('change', applySeasonFilter);
    });

    // ── Layer toggles ───────────────────────────────────────────────────────
    document.getElementById('toggle-seasonal').addEventListener('change', function() {
      const vis = this.checked ? 'visible' : 'none';
      ['avalanche-fill', 'avalanche-outline'].forEach(id => {
        map.setLayoutProperty(id, 'visibility', vis);
      });
      updateStats();
    });

    document.getElementById('toggle-hotspot').addEventListener('change', function() {
      const vis = this.checked ? 'visible' : 'none';
      ['hotspot-fill', 'hotspot-outline'].forEach(id => {
        map.setLayoutProperty(id, 'visibility', vis);
      });

      // Debug: try to query features when toggled on
      if (this.checked) {
        setTimeout(() => {
          const debugEl = document.getElementById('debug-msg');
          const features = map.queryRenderedFeatures({ layers: ['hotspot-fill'] });
          if (features.length === 0) {
            debugEl.style.display = 'block';
            debugEl.innerHTML = '⚠ 0 hotspot features rendered.<br>Check: source-layer name, zoom range, or empty tileset. Open console for details.';

            // Extra debug: check all source layers
            try {
              const src = map.getSource('hotspots');
              console.log('[Hotspot] Source object:', src);
              console.log('[Hotspot] Trying querySourceFeatures...');
              const srcFeats = map.querySourceFeatures('hotspots', { sourceLayer: 'hotspots' });
              console.log('[Hotspot] querySourceFeatures("hotspots"):', srcFeats.length, 'features');
            } catch (err) {
              console.log('[Hotspot] Debug error:', err);
            }
          } else {
            debugEl.style.display = 'none';
          }
        }, 500);
      } else {
        document.getElementById('debug-msg').style.display = 'none';
      }
    });

    // ── Stats panel ─────────────────────────────────────────────────────────
    function updateStats() {
      let features;
      try {
        features = map.queryRenderedFeatures({ layers: ['avalanche-fill'] });
      } catch {
        features = [];
      }
      const count     = features.length;
      const totalArea = features.reduce((s, f) => s + (f.properties.Area_m2 || 0), 0);
      const highConf  = features.filter(f => f.properties.confidence === 'higher confidence').length;
      const lowConf   = count - highConf;

      document.getElementById('count').textContent      = count.toLocaleString();
      document.getElementById('total-area').textContent  = (totalArea / 10000).toFixed(1);
      document.getElementById('high-conf').textContent   = highConf.toLocaleString();
      document.getElementById('low-conf').textContent    = lowConf.toLocaleString();
    }

    map.on('moveend', updateStats);
    map.on('zoomend', updateStats);
  </script>
</body>
</html>
